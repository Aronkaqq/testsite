    function useInView(options = {}) {
      const ref = useRef(null);
      const [isVisible, setIsVisible] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) { setIsVisible(true); observer.unobserve(el); }
        }, { threshold: 0.15, ...options });
        observer.observe(el);
        return () => observer.disconnect();
      }, []);
      return [ref, isVisible];

                <a href="#hero" style={{ display:"block", textAlign:"center", marginTop:28, padding:"14px", borderRadius:8, background:"var(--cream)", color:"var(--brown-900)", textDecoration:"none", fontWeight:600, fontSize:15, border:"1.5px solid var(--brown-200)", transition:"all 0.2s" }} onMouseEnter={e => { e.target.style.borderColor="var(--brown-900)"; e.target.style.background="var(--cream-dark)"; }} onMouseLeave={e => { e.target.style.borderColor="var(--brown-200)"; e.target.style.background="var(--cream)"; }}>Get Started</a>
              </div>
            </div>

            <p style={{ textAlign:"center", marginTop:40, color:"var(--text-light)", fontSize:14, lineHeight:1.6, maxWidth:500, margin:"40px auto 0" }}>
              Not sure which service you need? <a href="#contact" style={{ color:"var(--gold-600)", fontWeight:600, textDecoration:"none" }}>Contact us</a> for a free consultation — we'll review your situation and recommend the best path forward.
            </p>
          </div>
        </section>
      );
    }

    function Trustpilot() {
      const [ref, visible] = useInView();
      return (
        <section id="reviews" style={{ padding:"80px 24px", background:"var(--white)" }} ref={ref}>
          <div style={{ maxWidth:900, margin:"0 auto", textAlign:"center" }}>
            <span style={{ display:"inline-block", padding:"6px 16px", borderRadius:100, background:"rgba(212,160,23,0.1)", color:"var(--gold-600)", fontSize:13, fontWeight:600, letterSpacing:"0.06em", textTransform:"uppercase", marginBottom:16 }}>Testimonials</span>
            <h2 style={{ fontFamily:"var(--font-display)", fontSize:"clamp(28px,3.5vw,40px)", fontWeight:700, marginBottom:16 }}>What Our Clients Say</h2>
            <p style={{ color:"var(--text-secondary)", fontSize:16, marginBottom:40, lineHeight:1.6 }}>We're proud of the trust our clients place in us. Here's what they have to say.</p>
            <div className={`animate-on-scroll ${visible?"visible":""}`} style={{ padding:"48px 32px", borderRadius:16, background:"var(--cream)", border:"1px solid var(--brown-100)", boxShadow:"0 4px 20px rgba(59,35,20,0.04)" }}>
              {TRUSTPILOT_WIDGET_ID ? (
                <div id="trustpilot-widget" data-widget-id={TRUSTPILOT_WIDGET_ID}></div>
              ) : (
                <div>
                  <div style={{ display:"flex", justifyContent:"center", gap:4, marginBottom:16 }}>{[1,2,3,4,5].map(i => <span key={i}>{Icons.star}</span>)}</div>
                  <p style={{ color:"var(--text-secondary)", fontSize:15, fontStyle:"italic", lineHeight:1.7, maxWidth:500, margin:"0 auto 24px" }}>
                    "Trustpilot reviews will appear here once the widget is configured. In the meantime, contact us to hear directly from our satisfied clients."
                  </p>
                  <div style={{ display:"inline-block", padding:"8px 20px", borderRadius:8, background:"var(--white)", color:"var(--text-light)", fontSize:13, fontWeight:500 }}>
                    Trustpilot Widget — Paste your widget ID in the configuration section
                  </div>
                </div>
              )}
            </div>
          </div>
        </section>
      );
    }

    function FAQ() {
      const [openIndex, setOpenIndex] = useState(null);
      const [ref, visible] = useInView();
      return (
        <section id="faq" style={{ padding:"100px 24px", background:"var(--cream)" }} ref={ref}>
          <div style={{ maxWidth:780, margin:"0 auto" }}>
            <div style={{ textAlign:"center", marginBottom:56 }}>
              <span style={{ display:"inline-block", padding:"6px 16px", borderRadius:100, background:"rgba(212,160,23,0.1)", color:"var(--gold-600)", fontSize:13, fontWeight:600, letterSpacing:"0.06em", textTransform:"uppercase", marginBottom:16 }}>FAQ</span>
              <h2 style={{ fontFamily:"var(--font-display)", fontSize:"clamp(28px,3.5vw,40px)", fontWeight:700, marginBottom:12 }}>Frequently Asked Questions</h2>
              <p style={{ color:"var(--text-secondary)", fontSize:16, lineHeight:1.6 }}>Everything you need to know about our services and the ITIN process.</p>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
              {faqData.map((item,i) => {
                const isOpen = openIndex === i;
                return (
                  <div key={i} className={`animate-on-scroll ${visible?"visible":""}`} style={{ background: isOpen ? "var(--white)" : "var(--white)", border:`1.5px solid ${isOpen ? "var(--gold-300)" : "var(--brown-100)"}`, borderRadius:12, overflow:"hidden", transition:"all 0.3s ease", transitionDelay:`${i*0.03}s` }}>
                    <button onClick={() => setOpenIndex(isOpen ? null : i)} style={{ width:"100%", padding:"20px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:16, background:"none", border:"none", cursor:"pointer", fontFamily:"var(--font-body)", fontSize:16, fontWeight:600, color:"var(--text-primary)", textAlign:"left" }}>
                      <span>{item.q}</span>
                      <span style={{ transform: isOpen ? "rotate(180deg)" : "rotate(0)", transition:"transform 0.3s ease", flexShrink:0, color:"var(--gold-600)" }}>{Icons.chevronDown}</span>
                    </button>
                    <div style={{ maxHeight: isOpen ? 300 : 0, overflow:"hidden", transition:"max-height 0.35s ease" }}>
                      <p style={{ padding:"0 24px 20px", color:"var(--text-secondary)", fontSize:15, lineHeight:1.7 }}>{item.a}</p>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </section>
      );
    }

    function Contact() {
      const [ref, visible] = useInView();
      const [form, setForm] = useState({ name:"", email:"", phone:"", situation:"", notes:"" });
      const [submitting, setSubmitting] = useState(false);
      const [submitted, setSubmitted] = useState(false);
      const handleSubmit = async () => {
        setSubmitting(true);
        try {
          const ok = await sendEmail({ from_name:form.name, from_email:form.email, phone:form.phone, situation:form.situation, notes:form.notes }, "Contact Page Form");
          if (ok) setSubmitted(true);
        } catch { alert("Something went wrong. Please try contacting us directly."); }
        setSubmitting(false);
      };
      const infoItems = [
        { icon: Icons.phone, label:"Phone", value: CONTACT.phone, href: `tel:${CONTACT.phone.replace(/\s/g,"")}` },
        { icon: Icons.mail, label:"Email", value: CONTACT.email, href: `mailto:${CONTACT.email}` },
        { icon: Icons.clock, label:"Hours", value: CONTACT.hours },
      ];
      const inp = { width:"100%", padding:"14px 16px", border:"1.5px solid var(--brown-200)", borderRadius:8, fontSize:15, fontFamily:"var(--font-body)", background:"var(--white)", color:"var(--text-primary)", outline:"none", transition:"border-color 0.2s" };
      const focus = e => e.target.style.borderColor = "var(--gold-500)";
      const blur = e => e.target.style.borderColor = "var(--brown-200)";

      return (
        <section id="contact" style={{ padding:"100px 24px", background:"linear-gradient(180deg, var(--cream) 0%, var(--cream-dark) 100%)" }} ref={ref}>
          <div style={{ maxWidth:1100, margin:"0 auto" }}>
            <div style={{ textAlign:"center", marginBottom:56 }}>
              <span style={{ display:"inline-block", padding:"6px 16px", borderRadius:100, background:"rgba(212,160,23,0.1)", color:"var(--gold-600)", fontSize:13, fontWeight:600, letterSpacing:"0.06em", textTransform:"uppercase", marginBottom:16 }}>Contact Us</span>
              <h2 style={{ fontFamily:"var(--font-display)", fontSize:"clamp(28px,3.5vw,40px)", fontWeight:700, marginBottom:12 }}>Let's Get Started</h2>
              <p style={{ color:"var(--text-secondary)", fontSize:16, lineHeight:1.6, maxWidth:540, margin:"0 auto" }}>Ready to simplify your U.S. tax process? Reach out today for a free consultation.</p>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:40 }} className="contact-grid">
              {/* Info */}
              <div className={`animate-on-scroll ${visible?"visible":""}`}>
                <div style={{ background:"var(--white)", borderRadius:16, padding:"36px 32px", border:"1px solid var(--brown-100)", boxShadow:"0 4px 20px rgba(59,35,20,0.04)", height:"100%", display:"flex", flexDirection:"column" }}>
                  <h3 style={{ fontFamily:"var(--font-display)", fontSize:22, fontWeight:600, marginBottom:28 }}>Contact Information</h3>
                  <div style={{ display:"flex", flexDirection:"column", gap:24, flex:1 }}>
                    {infoItems.map((item,i) => (
                      <div key={i} style={{ display:"flex", gap:16, alignItems:"flex-start" }}>
                        <div style={{ width:44, height:44, borderRadius:10, flexShrink:0, background:"rgba(212,160,23,0.08)", display:"flex", alignItems:"center", justifyContent:"center", color:"var(--gold-600)" }}>{item.icon}</div>
                        <div>
                          <p style={{ fontSize:12, fontWeight:600, color:"var(--text-light)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4 }}>{item.label}</p>
                          {item.href ? <a href={item.href} style={{ color:"var(--text-primary)", textDecoration:"none", fontSize:15, fontWeight:500 }}>{item.value}</a> : <p style={{ color:"var(--text-primary)", fontSize:15, fontWeight:500, lineHeight:1.5 }}>{item.value}</p>}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{ marginTop:32, paddingTop:24, borderTop:"1px solid var(--brown-100)" }}>
                    <p style={{ fontSize:13, fontWeight:600, color:"var(--text-light)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:14 }}>Connect with us</p>
                    <div style={{ display:"flex", gap:12 }}>
                      {[
                        { icon:Icons.telegram, href:SOCIALS.telegram, label:"Telegram" },
                        { icon:Icons.whatsapp, href:SOCIALS.whatsapp, label:"WhatsApp" },
                        { icon:Icons.instagram, href:SOCIALS.instagram, label:"Instagram" },
                        { icon:Icons.facebook, href:SOCIALS.facebook, label:"Facebook" },
                      ].map((s,i) => (
                        <a key={i} href={s.href} target="_blank" rel="noopener noreferrer" title={s.label} style={{ width:44, height:44, borderRadius:10, background:"var(--brown-900)", color:"var(--cream)", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.2s", textDecoration:"none" }} onMouseEnter={e => { e.currentTarget.style.background="var(--gold-600)"; e.currentTarget.style.transform="translateY(-2px)"; }} onMouseLeave={e => { e.currentTarget.style.background="var(--brown-900)"; e.currentTarget.style.transform="translateY(0)"; }}>{s.icon}</a>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
              {/* Form */}
              <div className={`animate-on-scroll animate-delay-2 ${visible?"visible":""}`}>
                <div style={{ background:"var(--white)", borderRadius:16, padding:"36px 32px", border:"1px solid var(--brown-100)", height:"100%", boxShadow:"0 4px 20px rgba(59,35,20,0.04)" }}>
                  {submitted ? (
                    <div style={{ textAlign:"center", padding:"60px 0", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100%" }}>
                      <div style={{ width:64, height:64, borderRadius:"50%", background:"rgba(212,160,23,0.12)", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 20px" }}>
                        <svg width="32" height="32" fill="none" stroke="var(--gold-600)" strokeWidth="2.5" strokeLinecap="round"><polyline points="6 16 12 22 26 8"/></svg>
                      </div>
                      <h3 style={{ fontFamily:"var(--font-display)", fontSize:24, marginBottom:8 }}>Message Sent!</h3>
                      <p style={{ color:"var(--text-secondary)", lineHeight:1.6 }}>We'll get back to you within 24 hours.</p>
                    </div>
                  ) : (
                    <>
                      <h3 style={{ fontFamily:"var(--font-display)", fontSize:22, fontWeight:600, marginBottom:4 }}>Send Us a Message</h3>
                      <p style={{ color:"var(--text-secondary)", fontSize:14, marginBottom:24, lineHeight:1.5 }}>Fill out the form and we'll respond as soon as possible.</p>
                      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                        <input type="text" placeholder="Full name" value={form.name} onChange={e => setForm({...form, name:e.target.value})} style={inp} onFocus={focus} onBlur={blur} />
                        <input type="email" placeholder="Email address" value={form.email} onChange={e => setForm({...form, email:e.target.value})} style={inp} onFocus={focus} onBlur={blur} />
                        <input type="tel" placeholder="Phone number — optional" value={form.phone} onChange={e => setForm({...form, phone:e.target.value})} style={inp} onFocus={focus} onBlur={blur} />
                        <select value={form.situation} onChange={e => setForm({...form, situation:e.target.value})} style={{...inp, color: form.situation ? "var(--text-primary)" : "var(--text-light)", cursor:"pointer"}} onFocus={focus} onBlur={blur}>
                          <option value="" disabled>What do you need help with?</option>
                          <option value="itin">ITIN Application</option>
                          <option value="ein">EIN Registration</option>
                          <option value="refund">Tax Refund Claim</option>
                          <option value="filing">Tax Return Filing</option>
                          <option value="other">Other / Not Sure</option>
                        </select>
                        <textarea placeholder="Your message — optional" value={form.notes} onChange={e => setForm({...form, notes:e.target.value})} rows={3} style={{...inp, resize:"vertical", minHeight:70}} onFocus={focus} onBlur={blur} />
                        <button type="button" onClick={handleSubmit} disabled={submitting || !form.name || !form.email} style={{ width:"100%", padding:16, border:"none", borderRadius:8, background: submitting ? "var(--brown-400)" : "var(--brown-900)", color:"var(--cream)", fontSize:16, fontWeight:600, fontFamily:"var(--font-body)", cursor: submitting ? "wait" : "pointer", transition:"all 0.2s", letterSpacing:"0.02em", opacity: (!form.name || !form.email) ? 0.5 : 1, marginTop:4 }} onMouseEnter={e => { if(!submitting) e.target.style.background="var(--brown-800)"; }} onMouseLeave={e => { if(!submitting) e.target.style.background="var(--brown-900)"; }}>
                          {submitting ? "Sending..." : "Send Message"}
                        </button>
                      </div>
                    </>
                  )}
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer style={{ background:"var(--brown-900)", color:"var(--brown-300)", padding:"48px 24px 32px", borderTop:"1px solid rgba(212,160,23,0.1)" }}>
          <div style={{ maxWidth:1100, margin:"0 auto", display:"flex", flexDirection:"column", alignItems:"center", gap:28 }}>
            <div style={{ width:"100%", display:"flex", flexWrap:"wrap", justifyContent:"center", alignItems:"center", gap:32 }} className="footer-row">
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                {/* PLACEHOLDER: Replace with <img src="logo.png" alt="MK Tax Solutions" style={{width:36,height:36,borderRadius:'50%'}} /> */}
                <div style={{ width:36, height:36, borderRadius:"50%", background:"var(--gold-500)", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"var(--font-display)", fontWeight:700, fontSize:14, color:"var(--brown-900)" }}>MK</div>
                <span style={{ fontFamily:"var(--font-display)", fontWeight:600, fontSize:16, color:"var(--cream)" }}>MK Tax Solutions</span>
              </div>
              <div style={{ width:4, height:4, borderRadius:"50%", background:"var(--brown-600)" }} className="footer-dot" />
              <div style={{ display:"flex", gap:24, flexWrap:"wrap", alignItems:"center" }}>
                {/* PLACEHOLDER: Replace # with actual URLs */}
                <a href="#" style={{ color:"var(--brown-300)", textDecoration:"none", fontSize:14, transition:"color 0.2s" }} onMouseEnter={e => e.target.style.color="var(--gold-400)"} onMouseLeave={e => e.target.style.color="var(--brown-300)"}>Privacy Policy</a>
                <a href="#" style={{ color:"var(--brown-300)", textDecoration:"none", fontSize:14, transition:"color 0.2s" }} onMouseEnter={e => e.target.style.color="var(--gold-400)"} onMouseLeave={e => e.target.style.color="var(--brown-300)"}>Terms of Service</a>
              </div>
              <div style={{ width:4, height:4, borderRadius:"50%", background:"var(--brown-600)" }} className="footer-dot" />
              <div style={{ display:"flex", gap:12 }}>
                {[
                  { icon:Icons.telegram, href:SOCIALS.telegram },
                  { icon:Icons.whatsapp, href:SOCIALS.whatsapp },
                  { icon:Icons.instagram, href:SOCIALS.instagram },
                  { icon:Icons.facebook, href:SOCIALS.facebook },
                ].map((s,i) => <a key={i} href={s.href} target="_blank" rel="noopener noreferrer" style={{ color:"var(--brown-400)", transition:"color 0.2s", textDecoration:"none" }} onMouseEnter={e => e.currentTarget.style.color="var(--gold-400)"} onMouseLeave={e => e.currentTarget.style.color="var(--brown-400)"}>{s.icon}</a>)}
              </div>
            </div>
            <div style={{ width:"100%", paddingTop:20, borderTop:"1px solid rgba(255,255,255,0.06)", textAlign:"center", fontSize:13, color:"var(--brown-500)" }}>
              © {new Date().getFullYear()} MK Tax Solutions. All rights reserved.
            </div>
          </div>
        </footer>
      );
    }

    // ─── App ───
    function App() {
      return (
        <>
          <Navbar />
          <main>
            <Hero />
            <HowItWorks />
            <About />
            <Pricing />
            <Trustpilot />
            <FAQ />
            <Contact />
          </main>
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
